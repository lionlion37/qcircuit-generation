# Fine-tuning config for SWAP-budget-conditioned unitary compilation.
#
# Initialises from the trained baseline (paper_unitary) rather than random weights.
# Hypothesis: starting from 96.1% compilation accuracy preserves the compilation
# signal while the model adapts to the new CLIP embedding distribution introduced
# by the "; swap_count=N" prompt suffix.
#
# Differences from unitary_swap_constrained.yaml (from-scratch training):
#   - init_from_pipeline_dir: baseline model weights as starting point
#   - learning_rate: 3e-5 (10× lower than from-scratch 3e-4)
#   - lr_scheduler: CosineAnnealingLR (gentler than OneCycleLR for fine-tuning)
#   - num_epochs: 75 (half of from-scratch; model starts from a good point)

general:
  output_path: ./artifacts/models/unitary-swap-finetuned/
  model_name: unitary_swap_finetuned
  experiment_name: unitary_swap_finetuned
  init_from_pipeline_dir: ./artifacts/models/unitary-baseline-reproduction/paper_unitary
  dataset: ./artifacts/datasets/unitary-swap-constrained/train
  njobs: 8
  device: auto
  verbose: true

model:
  type: QC_Compilation_UNet
  save_type: pt
  params:
    model_features: [128, 128, 256]
    clr_dim: 8
    num_clrs: 8
    t_emb_size: 256
    cond_emb_size: 512
    num_heads: [8, 8, 2]
    num_res_blocks: [2, 2, 4]
    transformer_depths: [1, 2, 1]
    unitary_encoder_config:
      cond_emb_size: 512
      model_features: [2, 32, 64, 512]
      num_heads: 8
      transformer_depths: [2, 2]
      dropout: 0.2

training:
  learning_rate: 3e-5
  optimizer: Adam
  lr_scheduler: CosineAnnealingLR
  loss: MSELoss
  num_epochs: 75
  batch_size: 256
  enable_guidance_train: true
  guidance_train_p: 0.1
  max_grad_norm: 1.0
  cached_text_enc: true
  ckpt_path: ./artifacts/models/checkpoints/unitary_swap_finetuned/
  ckpt_interval: 5
  wandb:
    enable: true
    project: qcircuit-generation
    run_name: unitary_swap_finetuned

text_encoder:
  type: CachedFrozenOpenCLIPEmbedder
  params:
    arch: ViT-B-32
    version: null
    max_length: 77
    freeze: true
    layer: penultimate
    enable_cache_token_limit: true
    local_weights_path: "./artifacts/models/encoders/open_clip_ViT-B-32_laion2b_s34b_b79k.bin"

scheduler:
  type: DDIMScheduler
  params:
    num_train_timesteps: 1000
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: cos_alpha
    input_perturbation: 0.1
    prediction_type: epsilon
    eta: 1

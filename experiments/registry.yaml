schema_version: 1

artifact_roots:
  datasets: artifacts/datasets
  models: artifacts/models
  evaluations: artifacts/evaluations
  logs: artifacts/logs

status_legend:
  ready: Artifacts are present and usable.
  partial: Some evidence exists, but artifacts or summaries are incomplete.
  missing: Expected artifacts are not currently present.
  unknown: Not yet audited carefully.

experiments:
  - id: srv_dataset_backend_comparison
    title: Quditkit vs Qiskit dataset generation
    task: dataset_generation
    thesis_goal: Compare backend choice for SRV dataset generation mainly w.r.t. processing time.
    configs:
      dataset:
        - conf/datasets/srv_paper_dataset_qiskit_optimized.yaml
        - conf/datasets/srv_paper_dataset_quditkit_not_optimized.yaml
    evidence:
      notebooks:
        - notebooks/datasets/dataset_generation_quditkit_vs_qiskit.ipynb
      docs:
        - docs/dataset_generation.md
    expected_artifacts:
      datasets:
        - artifacts/datasets/srv-datasets/qiskit
        - artifacts/datasets/srv-datasets/quditkit
      evaluations:
        - artifacts/evaluation/srv-dataset-backend-comparison
      models: []
      notes: []
    status:
      overall: partial
      notes: Notebook with results exist, but still need to save results and create figures.

  - id: bucket_padding_variants
    title: Bucket padding variants
    task: training_data_pipeline
    thesis_goal: Compare alternative padding and bucketing behavior during SRV training. Show impact of bucket padding on model performance.
    configs:
      training:
        - conf/training/paper_stage_2.yaml
    evidence:
      notebooks:
        - notebooks/training/bucket_padding/bucket_deep_dive.ipynb
        - notebooks/training/bucket_padding/bucket_training_alignment_check.ipynb
      docs:
        - docs/training_pipeline.md
    expected_artifacts:
      datasets: []
      models:
        - artifacts/models/bucket-padding-variants
      evaluations:
        - artifacts/evaluations/bucket-padding-variants
      notes: []
    status:
      overall: partial
      notes: Analysis notebooks exist, also two trained models (*_stage_2_BUG). However, still have to be evaluated correctly and looked at closer.

  - id: srv_baseline_reproduction
    title: SRV baseline reproduction
    task: training_and_evaluation
    thesis_goal: Reproduce the paper SRV baseline.
    configs:
      training:
        - conf/training/paper_stage_1.yaml
        - conf/training/paper_stage_2.yaml
      evaluation:
        - conf/evaluation/paper_srv.yaml
    evidence:
      notebooks:
        - notebooks/evaluation/srv/model_evaluation.ipynb
        - notebooks/evaluation/srv/model_evaluation_with_repairs.ipynb
      docs:
        - docs/training_pipeline.md
        - docs/evaluation_pipeline.md
    expected_artifacts:
      datasets:
        - artifacts/datasets/srv-datasets/qiskit
        - artifacts/datasets/srv-datasets/quditkit
      models:
        - artifacts/models/srv-baseline-reproduction
      evaluations:
        - artifacts/evaluations/srv-baseline-reproduction
      notes: []
    status:
      overall: partial
      notes: Baseline model was successfully trained. Need to generate evaluation artifacts.

  - id: unitary_baseline_reproduction
    title: Unitary baseline reproduction
    task: training_and_evaluation
    thesis_goal: Reproduce the paper compilation baseline for the 3-qubit unitary task.
    configs:
      training:
        - conf/training/paper_unitary.yaml
      evaluation:
        - conf/evaluation/paper_unitary.yaml
    evidence:
      notebooks:
        - notebooks/evaluation/unitary/unitary_model_evaluation.ipynb
      docs:
        - docs/training_pipeline.md
        - docs/evaluation_pipeline.md
    expected_artifacts:
      datasets:
        - artifacts/datasets/unitary-baseline-reproduction/train/qiskit
        - artifacts/datasets/unitary-baseline-reproduction/eval/qiskit
        - artifacts/datasets/unitary-baseline-reproduction/eval/quditkit
      models:
        - artifacts/models/unitary-baseline-reproduction
      evaluations:
        - artifacts/evaluations/unitary-baseline-reproduction
      notes: []
    status:
      overall: partial
      notes: Unitary model was successfully trained from scratch and has same performance as remote model. However, they both have worse results then reported int the paper, therefore evaluation has to be checked.

  - id: srv_text_encoder_cloob
    title: SRV task with CLOOB instead of CLIP
    task: ablation
    thesis_goal: Measure the effect of replacing CLIP with CLOOB on the SRV task.
    configs:
      training:
        - conf/training/cloob_rn50_stage_1.yaml
        - conf/training/cloob_rn50_stage_2.yaml
        - conf/training/cloob_rn50x4_stage_1.yaml
        - conf/training/cloob_rn50x4_stage_2.yaml
        - conf/training/clip_rn50_stage_1.yaml
        - conf/training/clip_rn50_stage_2.yaml
        - conf/training/clip_rn50x4_stage_1.yaml
        - conf/training/clip_rn50x4_stage_2.yaml
    evidence:
      notebooks:
        - notebooks/evaluation/srv/model_evaluation.ipynb
      docs:
        - docs/training_pipeline.md
    expected_artifacts:
      datasets:
        - artifacts/datasets/srv-datasets/qiskit
      models:
        - artifacts/models/srv-text-encoder-ablation
      evaluations:
        - artifacts/evaluations/srv-text-encoder-ablation
      notes:
        - reports/srv-text-encoder-ablation
    status:
      overall: ready
      notes: Some polishing still has to be done.

  - id: unitary_curriculum_learning
    title: Unitary curriculum learning
    task: curriculum_learning
    thesis_goal: Test whether curriculum learning improves the unitary compilation task.
    configs:
      dataset:
        - conf/datasets/unitary_curriculum_stage1_quditkit.yaml
        - conf/datasets/unitary_curriculum_stage2_qiskit.yaml
      training:
        - conf/training/unitary_curriculum_stage1.yaml
        - conf/training/unitary_curriculum_stage2.yaml
    evidence:
      docs:
        - docs/curriculum_learning.md
        - docs/training_pipeline.md
      notebooks:
        - notebooks/evaluation/unitary/unitary_model_evaluation.ipynb
    expected_artifacts:
      datasets:
        - artifacts/datasets/unitary-curriculum-learning/stage1
        - artifacts/datasets/unitary-curriculum-learning/stage2
      models:
        - artifacts/models/unitary-curriculum-learning/stage1
        - artifacts/models/unitary-curriculum-learning/stage2
      evaluations:
        - artifacts/evaluations/unitary-curriculum-learning
      notes:
        - reports/thesis/notes/unitary_curriculum_learning.md
    status:
      overall: partial
      notes: Early stages, pipeline is running, however has to be finetuned.

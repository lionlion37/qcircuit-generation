  - id: unitary_swap_count_conditioning
    title: SWAP-count conditioning for unitary compilation
    task: ablation
    thesis_goal: >
      Extend the unitary compilation model to accept an exact SWAP gate count via
      a prompt suffix ("; swap_count=N"), enabling the user to steer how many SWAP
      gates appear in generated circuits — a practical noise-reduction handle for
      real hardware (fewer SWAPs = lower gate error on near-term devices).
    configs:
      dataset:
        - conf/datasets/unitary_swap_constrained_qiskit.yaml
      training:
        - conf/training/unitary_swap_constrained.yaml
    evidence:
      notebooks:
        - notebooks/datasets/swap_gate_analysis.ipynb
        - notebooks/evaluation/unitary/swap_constrained_evaluation.ipynb
      docs: []
    expected_artifacts:
      datasets:
        - artifacts/datasets/unitary-swap-constrained/train
      models:
        - artifacts/models/unitary-swap-constrained/unitary_swap_constrained
      evaluations:
        - artifacts/evaluations/unitary-swap-constrained/swap_count_evaluation
      notes:
        - reports/swap-count-conditioning/notes.md
    status:
      overall: ready
      notes: >
        Complete. All artifacts present. Key results (128 unitaries, 64 samples,
        float64-corrected evaluation): baseline exact_found_rate=0.961;
        swap_constrained at count=0: exact_found=0.648, compliance=1.000;
        count=1: exact_found=0.633, compliance=1.000;
        count=2: exact_found=0.672, compliance=0.999;
        count=3: exact_found=0.469, compliance=1.000.
        SWAP compliance is near-perfect across all counts. Accuracy drops ~30pp
        vs baseline even at count=1 (the baseline's natural output), revealing
        that adding the suffix disrupts the CLIP conditioning vector enough to
        degrade compilation — not a constraint-difficulty effect. Wrong circuits
        have median infidelity ~0.94 (not near-misses; completely wrong unitaries).
        Syntax quality unaffected (valid_decode_rate ~99.6% vs baseline 99.8%).
        Architectural conclusion: CLIP text conditioning is not modular enough for
        independent numerical constraints; a dedicated scalar conditioning channel
        would be needed to preserve compilation accuracy.
        See reports/swap-count-conditioning/notes.md for full analysis.

  - id: unitary_swap_finetuned
    title: SWAP-count conditioning via fine-tuning from baseline
    task: ablation
    thesis_goal: >
      Determine whether fine-tuning the baseline model (96.1% exact_found_rate) on
      the swap-labelled dataset closes the accuracy gap seen in from-scratch training
      (63–67% at counts 0–2). If fine-tuning preserves compilation accuracy while
      retaining SWAP compliance, it demonstrates that noise-aware conditioning is
      viable within the current CLIP-based architecture given the right training
      strategy.
    configs:
      dataset:
        - conf/datasets/unitary_swap_constrained_qiskit.yaml
      training:
        - conf/training/unitary_swap_finetuned.yaml
    evidence:
      notebooks:
        - notebooks/evaluation/unitary/swap_constrained_evaluation.ipynb
      docs: []
    expected_artifacts:
      datasets:
        - artifacts/datasets/unitary-swap-constrained/train
      models:
        - artifacts/models/unitary-swap-finetuned/unitary_swap_finetuned
      evaluations:
        - artifacts/evaluations/unitary-swap-finetuned/swap_count_evaluation
      notes:
        - reports/swap-count-conditioning/finetuned_notes.md
    status:
      overall: partial
      notes: >
        Config created. Dataset already available (reuses unitary-swap-constrained/train).
        Training not yet started. Evaluation notebook exists and can be reused
        by pointing SWAP_MODEL_DIR at the new model path and setting
        ARTIFACT_SUBDIR = "unitary-swap-finetuned".

  - id: unitary_curriculum_learning
    title: Unitary curriculum learning
    task: curriculum_learning
    thesis_goal: Test whether curriculum learning improves the unitary compilation task.
    configs:
      dataset:
        - conf/datasets/unitary_curriculum_stage1_quditkit.yaml
        - conf/datasets/unitary_curriculum_stage1_eval_quditkit.yaml
        - conf/datasets/unitary_curriculum_stage2_qiskit.yaml
      training:
        - conf/training/unitary_curriculum_stage1.yaml
        - conf/training/unitary_curriculum_stage2.yaml
    evidence:
      docs:
        - docs/curriculum_learning.md
        - docs/training_pipeline.md
      notebooks:
        - notebooks/evaluation/unitary/unitary_model_evaluation.ipynb
    expected_artifacts:
      datasets:
        - artifacts/datasets/unitary-curriculum-learning/stage1
        - artifacts/datasets/unitary-curriculum-learning/stage1_eval
        - artifacts/datasets/unitary-curriculum-learning/stage2
      models:
        - artifacts/models/unitary-curriculum-learning/unitary_curriculum_stage1
        - artifacts/models/unitary-curriculum-learning/unitary_curriculum_stage2
      evaluations:
        - artifacts/evaluations/unitary-curriculum-learning
      notes:
        - reports/thesis/notes/unitary_curriculum_learning.md
    status:
      overall: in_progress
      notes: >
        Stage1 (150 epochs, optimized quditkit) + stage2 (150 epochs) complete.
        Stage2 exact_found_rate=0.953 vs baseline 1.000 on stage1_eval (Clifford-only,
        qiskit backend, float64 U). Stage2 still underperforms baseline; root causes
        include smaller stage2 dataset (~8x baseline), OneCycleLR warmup disrupting
        pretrained weights, and backend mismatch between stages.
